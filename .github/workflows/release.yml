name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-native:
    name: Build Native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: wcss-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: wcss-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: wcss-macos-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: wcss-macos-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: wcss-windows-x64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-release-
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/benchmark_5k dist/ 2>/dev/null || true
          cp target/${{ matrix.target }}/release/small_test dist/ 2>/dev/null || true
          # Copy any library artifacts
          find target/${{ matrix.target }}/release -maxdepth 1 \( -name "*.so" -o -name "*.dylib" \) -exec cp {} dist/ \;
          tar -czf ${{ matrix.artifact }}.tar.gz -C dist .
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target/${{ matrix.target }}/release/*.exe dist/ -ErrorAction SilentlyContinue
          Copy-Item target/${{ matrix.target }}/release/*.dll dist/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact }}.zip
      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  build-wasm:
    name: Build WASM Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-wasm-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-release-
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM (bundler)
        run: wasm-pack build crates/wcss-wasm --target bundler --out-dir ../../pkg/bundler
      - name: Build WASM (nodejs)
        run: wasm-pack build crates/wcss-wasm --target nodejs --out-dir ../../pkg/nodejs
      - name: Package WASM
        run: tar -czf wcss-wasm.tar.gz pkg/
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wcss-wasm
          path: wcss-wasm.tar.gz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-native, build-wasm]
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: List artifacts
        run: find artifacts/ -type f
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wcss-linux-x64/*.tar.gz
            artifacts/wcss-linux-arm64/*.tar.gz
            artifacts/wcss-macos-x64/*.tar.gz
            artifacts/wcss-macos-arm64/*.tar.gz
            artifacts/wcss-windows-x64/*.zip
            artifacts/wcss-wasm/*.tar.gz

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [build-wasm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM (bundler)
        run: wasm-pack build crates/wcss-wasm --target bundler --out-dir ../../pkg/bundler
      - name: Build WASM (nodejs)
        run: wasm-pack build crates/wcss-wasm --target nodejs --out-dir ../../pkg/nodejs
      - name: Install npm dependencies
        run: npm ci --ignore-scripts || npm install --ignore-scripts
      - name: Publish WASM package
        run: npm run publish:wasm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish plugin packages
        run: npm run publish:plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
